name: Daily Stats Update
on:
  schedule:
    # 07:30 UTC = 2:30am Central in DST (March-November) /
    #             1:30am Central in standard time (November-March).
    # Pinned to UTC because GitHub Actions ignores the `timezone:
    - cron: '30 7 * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run updater
        env:
          KEVSCORES_TOKEN: ${{ secrets.KEVSCORES_TOKEN }}
        run: python public_updater.py
